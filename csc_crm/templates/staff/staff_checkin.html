<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Staff Attendance Entry</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fc;
            padding:40px;
        }

        .container{

            width:100%;
            max-width:600px;

            margin:auto;

            background:white;

            padding:35px;

            border-radius:15px;

            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .title{

            text-align:center;

            margin-bottom:30px;

            color:#222;

            font-size:30px;

            font-weight:bold;
        }

        .input-group{
            margin-bottom:20px;
        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

            color:#444;
        }

        input{

            width:100%;

            padding:12px;

            border:1px solid #ccc;

            border-radius:10px;

            outline:none;

            font-size:15px;
        }

        .btn-group{

            display:flex;
            gap:20px;
            margin-top:20px;
        }

        .checkin-btn{

            flex:1;

            padding:14px;

            border:none;

            background:green;

            color:white;

            font-size:16px;

            border-radius:10px;

            cursor:pointer;
        }

        .checkout-btn{

            flex:1;

            padding:14px;

            border:none;

            background:red;

            color:white;

            font-size:16px;

            border-radius:10px;

            cursor:pointer;
        }

        .leave-btn{

    flex:1;

    padding:14px;

    border:none;

    background:orange;

    color:white;

    font-size:16px;

    border-radius:10px;

    cursor:pointer;
}
.absent-btn{

    flex:1;

    padding:14px;

    border:none;

    background:#df5252;

    color:white;

    font-size:16px;

    border-radius:10px;

    cursor:pointer;
}
    </style>

</head>

<body>

<div class="container">

    <h1 class="title">
        Staff Attendance
    </h1>

    <form method="POST">

        {% csrf_token %}

        <div class="input-group">

            <label>
                Staff Name
            </label>

            <input
                type="text"
                name="staff_name"
                placeholder="Enter Staff Name"
                required
            >

        </div>

        <div class="btn-group">

            <button
                type="submit"
                name="action"
                value="checkin"
                class="checkin-btn">

                Log In

            </button>

            <button
                type="submit"
                name="action"
                value="checkout"
                class="checkout-btn">

                Log Out

            </button>
            <br><br>
            <button
    type="submit"
    name="action"
    value="leave"
    class="leave-btn">

    Leave

</button>
              <button
    type="submit"
    name="action"
    value="absent"
    class="absent-btn">

    Absent

</button>
        </div>

    </form>

</div>

</body>
</html>
